<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="內湖高中軍武社 - 幹部後台">
  <title>幹部後台 | 內湖高中軍武社</title>

  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .tab-btn.active {
      background-color: var(--color-primary);
      color: var(--color-background);
      font-weight: 700;
    }
  </style>
</head>

<body>
  <!-- 液態流動背景 -->
  <div class="liquid-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div id="site-header"></div>

  <!-- 頁面標題 -->
  <section class="hero-section py-16 px-4 text-center" data-aos="fade-up">
    <div class="hero-bg" style="background-image: url('../assets/images/IMG_1645.jpg');"></div>
    <div class="relative z-10">
      <h1 class="hero-title text-4xl md:text-5xl font-bold text-yellow-300 mb-2" style="font-family:'Oswald',sans-serif;">幹部後台</h1>
      <p class="text-gray-400 text-sm uppercase tracking-widest">Admin Panel</p>
      <p class="text-gray-400 text-sm mt-2">登入帳號：<span id="adminEmail" class="text-primary">載入中...</span></p>
      <button id="logoutBtn"
        class="btn btn-danger mt-6 px-8 py-2.5 rounded-full shadow-[0_10px_20px_-10px_rgba(239,68,68,0.5)] tracking-widest text-sm transition-transform hover:-translate-y-1">🚪
        登出系統</button>
    </div>
  </section>

  <!-- Tab 導覽 -->
  <div class="bg-gray-900 border-b border-gray-800 sticky top-[60px] z-40">
    <div class="max-w-6xl mx-auto px-4">
      <div class="flex overflow-x-auto gap-1 py-2 scrollbar-hide">
        <button class="tab-btn btn btn-ghost text-xs md:text-sm px-4 py-2 shrink-0 rounded-full active"
          data-target="announceModule">📣 公告管理</button>
        <button class="tab-btn btn btn-ghost text-xs md:text-sm px-4 py-2 shrink-0 rounded-full"
          data-target="eventModule">📅 活動管理</button>
        <button class="tab-btn btn btn-ghost text-xs md:text-sm px-4 py-2 shrink-0 rounded-full"
          data-target="dailyModule">📝 單日簽到</button>
        <button class="tab-btn btn btn-ghost text-xs md:text-sm px-4 py-2 shrink-0 rounded-full"
          data-target="summaryModule">📊 出席總覽</button>
        <button class="tab-btn btn btn-ghost text-xs md:text-sm px-4 py-2 shrink-0 rounded-full"
          data-target="studentModule">👨‍🎓 學生管理</button>
        <button class="tab-btn btn btn-ghost text-xs md:text-sm px-4 py-2 shrink-0 rounded-full"
          data-target="financeModule">💰 財務管理</button>
      </div>
    </div>
  </div>

  <main class="max-w-6xl mx-auto px-4 py-12">

    <!-- ===== 公告管理 ===== -->
    <section id="announceModule" class="tab-content active space-y-6">
      <h2 class="section-title"><span class="w-1.5 h-8 bg-primary block rounded-full"></span>公告管理 <span
          class="text-sm text-gray-500 font-normal ml-2 tracking-widest uppercase">Announcements</span></h2>

      <!-- 新增公告 -->
      <div class="card p-6">
        <h3 class="text-primary font-bold mb-4" style="font-family:'Oswald',sans-serif;">➕ 新增公告</h3>
        <div class="space-y-3">
          <div>
            <label class="form-label">公告內容 <span class="text-red-400">*</span></label>
            <textarea id="announceText" rows="3" class="form-input resize-none" placeholder="輸入公告內容..."></textarea>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div>
              <label class="form-label">關聯活動 ID（選填）</label>
              <input id="announceEventId" type="text" class="form-input" placeholder="活動 ID（可留空）">
            </div>
            <div>
              <label class="form-label">失效日期（選填）</label>
              <input id="announceExpiry" type="date" class="form-input">
            </div>
          </div>
          <button onclick="addAnnouncement()"
            class="btn btn-primary w-full py-3.5 mt-2 rounded-full shadow-[0_10px_20px_-10px_rgba(250,204,21,0.5)] tracking-widest">發布公告</button>
        </div>
      </div>

      <!-- 公告列表 -->
      <div class="card p-6">
        <h3 class="text-primary font-bold mb-4" style="font-family:'Oswald',sans-serif;">📋 現有公告</h3>
        <div id="announceList" class="space-y-2">
          <div class="text-gray-500 text-sm py-4 text-center">載入中...</div>
        </div>
      </div>
    </section>

    <!-- ===== 活動管理 ===== -->
    <section id="eventModule" class="tab-content space-y-6">
      <h2 class="section-title"><span class="w-1.5 h-8 bg-primary block rounded-full"></span>活動管理 <span
          class="text-sm text-gray-500 font-normal ml-2 tracking-widest uppercase">Events</span></h2>

      <!-- 新增活動 -->
      <div class="card p-6">
        <h3 class="text-primary font-bold mb-4" style="font-family:'Oswald',sans-serif;">➕ 新增活動</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <div>
            <label class="form-label">活動名稱 <span class="text-red-400">*</span></label>
            <input id="eventTitle" type="text" class="form-input" placeholder="活動名稱">
          </div>
          <div>
            <label class="form-label">活動日期 <span class="text-red-400">*</span></label>
            <input id="eventDate" type="date" class="form-input">
          </div>
          <div class="md:col-span-2">
            <label class="form-label">活動說明</label>
            <textarea id="eventDesc" rows="2" class="form-input resize-none" placeholder="活動說明（選填）"></textarea>
          </div>
        </div>
        <button onclick="addEvent()"
          class="btn btn-primary w-full py-3.5 mt-5 rounded-full shadow-[0_10px_20px_-10px_rgba(250,204,21,0.5)] tracking-widest">新增活動</button>
      </div>

      <!-- 活動列表 -->
      <div class="card overflow-hidden">
        <table class="data-table">
          <thead>
            <tr>
              <th>活動名稱</th>
              <th>日期</th>
              <th>說明</th>
              <th class="text-center">操作</th>
            </tr>
          </thead>
          <tbody id="eventList">
            <tr>
              <td colspan="4" class="text-center text-gray-500 py-6">載入中...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- ===== 單日簽到管理 ===== -->
    <section id="dailyModule" class="tab-content space-y-6">
      <h2 class="section-title"><span class="w-1.5 h-8 bg-primary block rounded-full"></span>單日簽到管理 <span
          class="text-sm text-gray-500 font-normal ml-2 tracking-widest uppercase">Daily Check-in</span></h2>
      <div class="card p-5">
        <div class="flex flex-wrap items-end gap-3 mb-4">
          <div>
            <label class="form-label">選擇日期</label>
            <input type="date" id="datePicker" class="form-input">
          </div>
          <button id="loadRecordsBtn"
            class="btn btn-secondary rounded-full px-6 shadow-lg hover:border-white/30">載入紀錄</button>
          <button id="exportBtn" class="btn btn-ghost rounded-full px-6">匯出 Excel</button>
          <button id="fillAbsentBtn" class="btn btn-danger rounded-full px-6 shadow-lg">一鍵補全缺席</button>
        </div>
        <div class="overflow-x-auto">
          <table class="data-table" id="recordsTable">
            <thead>
              <tr>
                <th>班級座號</th>
                <th>姓名</th>
                <th>狀態</th>
                <th>原因</th>
                <th>時間</th>
                <th class="text-center">操作</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="6" class="text-center text-gray-500 py-6">請選擇日期後載入紀錄</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- ===== 出席總覽 ===== -->
    <section id="summaryModule" class="tab-content space-y-6">
      <h2 class="section-title"><span class="w-1.5 h-8 bg-primary block rounded-full"></span>出席總覽 <span
          class="text-sm text-gray-500 font-normal ml-2 tracking-widest uppercase">Attendance Summary</span></h2>
      <div class="card p-5">
        <div class="flex flex-wrap items-end gap-3 mb-4">
          <div>
            <label class="form-label">開始日期</label>
            <input type="date" id="startDate" class="form-input">
          </div>
          <div>
            <label class="form-label">結束日期</label>
            <input type="date" id="endDate" class="form-input">
          </div>
          <button id="loadSummaryBtn"
            class="btn btn-secondary rounded-full px-6 shadow-lg hover:border-white/30">載入總覽</button>
          <button id="exportSummaryBtn" class="btn btn-ghost rounded-full px-6">匯出 Excel</button>
        </div>
        <div class="overflow-x-auto">
          <table class="data-table" id="summaryTable">
            <thead>
              <tr>
                <th>班級座號</th>
                <th>姓名</th>
                <th>缺席原因</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="3" class="text-center text-gray-500 py-6">請選擇日期範圍後載入</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- ===== 學生管理 ===== -->
    <section id="studentModule" class="tab-content space-y-6">
      <h2 class="section-title"><span class="w-1.5 h-8 bg-primary block rounded-full"></span>學生名單管理 <span
          class="text-sm text-gray-500 font-normal ml-2 tracking-widest uppercase">Students</span></h2>
      <div class="card p-6">
        <h3 class="text-primary font-bold mb-4" style="font-family:'Oswald',sans-serif;">➕ 新增學生</h3>
        <form id="studentForm" class="flex flex-wrap gap-3">
          <div class="flex-1 min-w-[140px]">
            <label class="form-label">班級座號 <span class="text-red-400">*</span></label>
            <input type="text" id="studentIdInput" placeholder="例：201-15" required class="form-input">
          </div>
          <div class="flex-1 min-w-[140px]">
            <label class="form-label">姓名 <span class="text-red-400">*</span></label>
            <input type="text" id="studentNameInput" placeholder="輸入姓名" required class="form-input">
          </div>
          <div class="flex items-end">
            <button type="submit"
              class="btn btn-primary px-8 py-3 rounded-full shadow-[0_10px_20px_-10px_rgba(250,204,21,0.5)] tracking-widest">新增學生</button>
          </div>
        </form>
      </div>
      <div class="card overflow-hidden">
        <table class="data-table" id="studentTable">
          <thead>
            <tr>
              <th>班級座號</th>
              <th>姓名</th>
              <th class="text-center">操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="3" class="text-center text-gray-500 py-6">載入中...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- ===== 財務管理 ===== -->
    <section id="financeModule" class="tab-content space-y-6">
      <h2 class="section-title"><span class="w-1.5 h-8 bg-primary block rounded-full"></span>財務管理 <span
          class="text-sm text-gray-500 font-normal ml-2 tracking-widest uppercase">Finance</span></h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

        <!-- 新增收入 -->
        <div class="card p-6">
          <h3 class="text-primary font-bold mb-4" style="font-family:'Oswald',sans-serif;">📥 新增收入</h3>
          <div class="space-y-3">
            <div>
              <label class="form-label">項目名稱</label>
              <input id="incomeItem" type="text" class="form-input" placeholder="例：社費收入">
            </div>
            <div>
              <label class="form-label">金額（NT$）</label>
              <input id="incomeAmount" type="number" class="form-input" placeholder="0">
            </div>
            <button onclick="addFinance('income')"
              class="btn btn-secondary w-full py-3 mt-2 rounded-full tracking-widest shadow-lg hover:border-white/30">新增收入</button>
          </div>
        </div>

        <!-- 新增支出 -->
        <div class="card p-6">
          <h3 class="text-primary font-bold mb-4" style="font-family:'Oswald',sans-serif;">📤 新增支出</h3>
          <div class="space-y-3">
            <div>
              <label class="form-label">項目名稱</label>
              <input id="expenseItem" type="text" class="form-input" placeholder="例：器材採購">
            </div>
            <div>
              <label class="form-label">金額（NT$）</label>
              <input id="expenseAmount" type="number" class="form-input" placeholder="0">
            </div>
            <button onclick="addFinance('expense')"
              class="btn btn-danger w-full py-3 mt-2 rounded-full tracking-widest shadow-[0_10px_20px_-10px_rgba(239,68,68,0.5)]">新增支出</button>
          </div>
        </div>
      </div>
    </section>

  </main>

  <div id="site-footer"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/components.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

  <script>
    // 全域初始化
    renderHeader('幹部後台');
    renderFooter();
    window.addEventListener('load', () => {
      document.body.classList.add('loaded');
      AOS.init({ duration: 400, once: true, offset: 50 });
    });

    // Tab 切換邏輯
    const tabs = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const target = document.getElementById(tab.dataset.target);
        tabContents.forEach(tc => tc.classList.remove('active'));
        target.classList.add('active');
      });
    });

    // 身份驗證
    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = '../login.html';
      } else {
        document.getElementById('adminEmail').textContent = user.email;
        // 初始化各模組
        initAnnounceModule();
        initEventModule();
        initDailyModule();
        initSummaryModule();
        initStudentModule();
        initFinanceModule();
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      auth.signOut().then(() => window.location.href = '../index.html');
    });

    // ===== 公告管理 =====
    function initAnnounceModule() {
      const announceRef = db.ref('announcements');
      const announceList = document.getElementById('announceList');

      announceRef.on('value', snapshot => {
        announceList.innerHTML = '';
        const announcements = snapshot.val() || {};
        if (Object.keys(announcements).length === 0) {
          announceList.innerHTML = '<div class="text-gray-500 text-sm py-4 text-center">目前沒有公告</div>';
          return;
        }
        for (const id in announcements) {
          const a = announcements[id];
          const div = document.createElement('div');
          div.className = 'p-3 bg-gray-800 rounded-lg flex justify-between items-center';
          div.innerHTML = `
            <div>
              <p class="text-white">${a.text}</p>
              <p class="text-xs text-gray-400 mt-1">發布於: ${new Date(a.timestamp).toLocaleString()}</p>
            </div>
            <button onclick="deleteAnnouncement('${id}')" class="btn btn-danger px-4 py-1.5 text-xs rounded-full shadow-lg transition-transform hover:scale-105">刪除</button>
          `;
          announceList.prepend(div);
        }
      });
    }

    function addAnnouncement() {
      const text = document.getElementById('announceText').value.trim();
      if (!text) { window.showToast('請輸入公告內容', false); return; }
      const eventId = document.getElementById('announceEventId').value.trim();
      const expiry = document.getElementById('announceExpiry').value;

      db.ref('announcements').push({
        text,
        eventId: eventId || null,
        expiry: expiry || null,
        timestamp: new Date().toISOString()
      }).then(() => {
        window.showToast('公告發布成功！', true);
        document.getElementById('announceText').value = '';
        document.getElementById('announceEventId').value = '';
        document.getElementById('announceExpiry').value = '';
      }).catch(err => window.showToast('發布失敗：' + err.message, false));
    }

    function deleteAnnouncement(id) {
      if (window.confirm('確定要刪除此公告嗎？')) {
        db.ref('announcements/' + id).remove()
          .then(() => window.showToast('刪除成功！', true))
          .catch(err => window.showToast('刪除失敗：' + err.message, false));
      }
    }

    // ===== 活動管理 =====
    function initEventModule() {
      const eventsRef = db.ref('events');
      const eventList = document.getElementById('eventList');

      eventsRef.on('value', snapshot => {
        eventList.innerHTML = '';
        const events = snapshot.val() || {};
        if (Object.keys(events).length === 0) {
          eventList.innerHTML = '<tr><td colspan="4" class="text-center text-gray-500 py-6">目前沒有活動</td></tr>';
          return;
        }
        for (const id in events) {
          const e = events[id];
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${e.title}</td>
            <td>${e.date}</td>
            <td class="text-gray-400 text-sm">${e.description || '-'}</td>
            <td class="text-center">
              <button onclick="deleteEvent('${id}')" class="btn btn-danger px-4 py-1.5 text-xs rounded-full shadow-lg transition-transform hover:scale-105">刪除</button>
            </td>
          `;
          eventList.prepend(tr);
        }
      });
    }

    function addEvent() {
      const title = document.getElementById('eventTitle').value.trim();
      const date = document.getElementById('eventDate').value;
      const description = document.getElementById('eventDesc').value.trim();
      if (!title || !date) { window.showToast('請輸入活動名稱和日期', false); return; }

      db.ref('events').push({ title, date, description })
        .then(() => {
          window.showToast('活動新增成功！', true);
          document.getElementById('eventTitle').value = '';
          document.getElementById('eventDate').value = '';
          document.getElementById('eventDesc').value = '';
        }).catch(err => window.showToast('新增失敗：' + err.message, false));
    }

    function deleteEvent(id) {
      if (window.confirm('確定要刪除此活動嗎？')) {
        db.ref('events/' + id).remove()
          .then(() => window.showToast('刪除成功！', true))
          .catch(err => window.showToast('刪除失敗：' + err.message, false));
      }
    }

    // ===== 學生管理 =====
    function initStudentModule() {
      const studentsRef = db.ref('students');
      const studentTable = document.getElementById('studentTable').getElementsByTagName('tbody')[0];
      const studentForm = document.getElementById('studentForm');

      studentsRef.on('value', snapshot => {
        studentTable.innerHTML = '';
        const students = snapshot.val() || {};
        if (Object.keys(students).length === 0) {
          studentTable.innerHTML = '<tr><td colspan="3" class="text-center text-gray-500 py-6">沒有學生資料</td></tr>';
          return;
        }
        for (const id in students) {
          const s = students[id];
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${id}</td>
            <td>${s.name}</td>
            <td class="text-center">
              <button onclick="deleteStudent('${id}')" class="btn btn-danger px-4 py-1.5 text-xs rounded-full shadow-lg transition-transform hover:scale-105">刪除</button>
            </td>
          `;
          studentTable.appendChild(tr);
        }
      });

      studentForm.addEventListener('submit', e => {
        e.preventDefault();
        const id = document.getElementById('studentIdInput').value.trim();
        const name = document.getElementById('studentNameInput').value.trim();
        if (!id || !name) { window.showToast('請輸入班級座號和姓名', false); return; }

        studentsRef.child(id).set({ name })
          .then(() => {
            window.showToast('學生新增成功！', true);
            studentForm.reset();
          }).catch(err => window.showToast('新增失敗：' + err.message, false));
      });
    }

    function deleteStudent(id) {
      if (window.confirm('確定要刪除此學生嗎？')) {
        db.ref('students/' + id).remove()
          .then(() => window.showToast('刪除成功！', true))
          .catch(err => window.showToast('刪除失敗：' + err.message, false));
      }
    }

    // ===== 財務管理 =====
    function initFinanceModule() {
      // ... (財務管理邏輯，此處省略)
    }

    function addFinance(type) {
      const item = document.getElementById(`${type}Item`).value.trim();
      const amount = parseFloat(document.getElementById(`${type}Amount`).value);
      if (!item || !amount) { window.showToast('請輸入項目名稱和金額', false); return; }

      db.ref('finance').push({ type, item, amount, timestamp: new Date().toISOString() })
        .then(() => {
          window.showToast('新增成功！', true);
          document.getElementById(`${type}Item`).value = '';
          document.getElementById(`${type}Amount`).value = '';
        }).catch(err => window.showToast('新增失敗：' + err.message, false));
    }

    function deleteFinance(id) {
      if (window.confirm('確定要刪除此筆紀錄嗎？')) {
        db.ref('finance/' + id).remove()
          .then(() => window.showToast('刪除成功！', true))
          .catch(err => window.showToast('刪除失敗：' + err.message, false));
      }
    }
