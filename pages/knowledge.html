<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="內湖高中軍武社 - 知識分享">
  <title>知識分享 | 內湖高中軍武社</title>

  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <!-- SimpleMDE CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simplemde@1.11.2/dist/simplemde.min.css">
  <style>
    /* SimpleMDE 深色主題覆寫 */
    .CodeMirror,
    .CodeMirror-scroll {
      background-color: var(--color-background-dark);
      color: var(--color-text-light);
      border-color: var(--color-border) !important;
      border-radius: 0.5rem;
    }

    .editor-toolbar {
      background-color: var(--color-card-bg);
      border-color: var(--color-border);
      border-top-left-radius: 0.5rem;
      border-top-right-radius: 0.5rem;
    }

    .editor-toolbar button {
      color: var(--color-text-light);
    }

    .editor-toolbar button.active,
    .editor-toolbar button:hover {
      background-color: var(--color-secondary);
      color: var(--color-primary);
    }

    .editor-statusbar {
      background-color: var(--color-card-bg);
      border-color: var(--color-border);
      color: var(--color-text-muted);
      border-bottom-left-radius: 0.5rem;
      border-bottom-right-radius: 0.5rem;
    }

    .CodeMirror-fullscreen {
      background-color: var(--color-background);
    }
  </style>
</head>

<body>
  <!-- 液態流動背景 -->
  <div class="liquid-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div id="site-header"></div>

  <!-- ========== 頁面標題區 ========== -->
  <section class="hero-section py-16 px-4 text-center" data-aos="fade-up">
    <div class="hero-bg" style="background-image: url('../assets/images/IMG_1645.jpg');"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-background/40 via-background/60 to-background z-10"></div>
    <div class="relative z-20">
      <h1 class="hero-title text-4xl md:text-5xl font-bold text-yellow-300 mb-2" style="font-family:'Oswald',sans-serif;">知識分享</h1>
      <p class="text-gray-400 text-sm uppercase tracking-widest">Knowledge Hub</p>
    </div>
  </section>

  <!-- ========== 主內容 ========== -->
  <main class="max-w-5xl mx-auto px-4 py-20 space-y-24">

    <!-- 新增文章區塊 -->
    <section id="editorSection" class="hidden" data-aos="fade-up">
      <h2 class="section-title"><span class="w-1.5 h-8 bg-primary block rounded-full"></span>新增文章 <span
          class="text-sm text-gray-500 font-normal ml-2 tracking-widest uppercase">New Article</span></h2>
      <div class="card p-6">
        <form id="articleForm" class="space-y-4">
          <div>
            <label for="articleTitle" class="form-label">文章標題</label>
            <input type="text" id="articleTitle" class="form-input" placeholder="請輸入文章標題" required>
          </div>
          <div>
            <label for="articleContent" class="form-label">文章內容 (支援 Markdown)</label>
            <textarea id="articleContent" class="form-input" rows="10" placeholder="請輸入文章內容"></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-full text-base py-3">發布文章</button>
        </form>
      </div>
    </section>

    <!-- 文章列表 -->
    <section data-aos="fade-up">
      <h2 class="section-title"><span class="w-1.5 h-8 bg-primary block rounded-full"></span>最新文章 <span
          class="text-sm text-gray-500 font-normal ml-2 tracking-widest uppercase">Articles</span></h2>
      <div id="articleList" class="space-y-6">
        <div class="card p-6 text-center text-gray-500">載入中...</div>
      </div>
    </section>

  </main>

  <div id="site-footer"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/components.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <!-- SimpleMDE JS -->
  <script src="https://cdn.jsdelivr.net/npm/simplemde@1.11.2/dist/simplemde.min.js"></script>
  <!-- Markdown-it for rendering -->
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>

  <script>
    renderHeader("知識分享");
    renderFooter();
    window.addEventListener('load', () => {
      document.body.classList.add('loaded');
      AOS.init({ duration: 400, once: true, offset: 50 });
    });

    const articleForm = document.getElementById("articleForm");
    const articleTitleInput = document.getElementById("articleTitle");
    const articleContentTextarea = document.getElementById("articleContent");
    const articleListDiv = document.getElementById("articleList");

    const articlesRef = db.ref("knowledge");
    const md = new markdownit();

    // Initialize SimpleMDE
    let simplemde;
    const editorSection = document.getElementById("editorSection");

    // 登入狀態控制編輯器顯示
    auth.onAuthStateChanged(user => {
      if (user) {
        editorSection.classList.remove("hidden");
        if (!simplemde) {
          simplemde = new SimpleMDE({
            element: articleContentTextarea,
            spellChecker: false,
            hideIcons: ["guide", "fullscreen"],
            showIcons: ["strikethrough", "code", "table", "redo", "undo", "heading", "heading-smaller", "heading-bigger", "heading-1", "heading-2", "heading-3", "clean-block", "horizontal-rule", "preview", "side-by-side", "image", "link"],
            toolbar: [
              "bold", "italic", "heading", "|", "quote", "code", "unordered-list", "ordered-list", "|",
              "link", "image", "|", "preview", "side-by-side", "fullscreen", "|", "guide"
            ],
            status: false, // 隱藏狀態欄
          });
        }
      } else {
        editorSection.classList.add("hidden");
      }
    });

    // Load articles from Firebase
    articlesRef.on("value", (snapshot) => {
      const articles = snapshot.val();
      articleListDiv.innerHTML = "";
      if (articles) {
        const sortedArticles = Object.keys(articles)
          .map((key) => ({ id: key, ...articles[key] }))
          .sort((a, b) => b.timestamp - a.timestamp); // Sort by newest first

        sortedArticles.forEach((article) => {
          const articleCard = document.createElement("div");
          articleCard.className = "card p-6 article-card";
          articleCard.setAttribute("data-aos", "fade-up");
          articleCard.innerHTML = `
            <h3 class="text-xl font-bold text-primary mb-2" style="font-family: var(--font-heading);">${article.title}</h3>
            <div class="text-xs text-gray-500 mb-4">發布於 ${new Date(article.timestamp).toLocaleString()}</div>
            <div class="prose prose-invert max-w-none">${md.render(article.content)}</div>
            <div class="mt-4 pt-4 border-t border-gray-700 flex justify-end">
              <button class="btn btn-sm btn-danger" onclick="deleteArticle(\'${article.id}\')">刪除</button>
            </div>
          `;
          articleListDiv.appendChild(articleCard);
        });
      } else {
        articleListDiv.innerHTML = `<div class="card p-6 text-center text-gray-500">目前沒有文章。</div>`;
      }
    });

    // Submit new article
    articleForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const title = articleTitleInput.value;
      const content = simplemde.value(); // Get content from SimpleMDE

      if (title && content) {
        articlesRef.push({
          title: title,
          content: content,
          timestamp: Date.now(),
        })
          .then(() => {
            window.showToast("文章發布成功！", true);
            articleForm.reset();
            simplemde.value(""); // Clear SimpleMDE editor
          })
          .catch((error) => {
            window.showToast("文章發布失敗: " + error.message, false);
          });
      } else {
        window.showToast("標題和內容都不能為空！", false);
      }
    });

    // Delete article
    window.deleteArticle = (id) => {
      if (confirm("確定要刪除這篇文章嗎？")) {
        articlesRef.child(id).remove()
          .then(() => {
            window.showToast("文章刪除成功！", true);
          })
          .catch((error) => {
            window.showToast("文章刪除失敗: " + error.message, false);
          });
      }
    };
  </script>
</body>

</html>
