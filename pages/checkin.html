<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="內湖高中軍武社 - 社課簽到">
  <title>社課簽到 | 內湖高中軍武社</title>

  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    @keyframes highlight-fade {
      0%   { background-color: rgba(250, 204, 21, 0.3); }
      100% { background-color: transparent; }
    }
    .highlight-row { animation: highlight-fade 2s ease-out forwards; }
    .animate-row { animation: fadeInUp 0.3s ease-out forwards; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <!-- 頁面標題 -->
  <section class="bg-green-950 py-10 px-4 text-center" data-aos="fade-up">
    <h1 class="text-3xl md:text-4xl font-bold text-yellow-300 mb-1" style="font-family:'Oswald',sans-serif;">社課簽到</h1>
    <p class="text-gray-400 text-sm" id="todayDate">今日日期載入中...</p>
  </section>

  <main class="max-w-5xl mx-auto px-4 py-10 space-y-8">

    <!-- 統計卡片 -->
    <section data-aos="fade-up">
      <div class="grid grid-cols-3 gap-4">
        <div class="card p-5 text-center bg-gray-800">
          <div class="text-yellow-300 text-xs font-semibold uppercase tracking-wider mb-1">總人數</div>
          <div id="totalCount" class="text-3xl font-bold text-white" style="font-family:'Oswald',sans-serif;">0</div>
        </div>
        <div class="card p-5 text-center bg-green-900">
          <div class="text-green-300 text-xs font-semibold uppercase tracking-wider mb-1">已簽到</div>
          <div id="signedCount" class="text-3xl font-bold text-white" style="font-family:'Oswald',sans-serif;">0</div>
        </div>
        <div class="card p-5 text-center bg-red-950">
          <div class="text-red-300 text-xs font-semibold uppercase tracking-wider mb-1">未簽到</div>
          <div id="unsignedCount" class="text-3xl font-bold text-white" style="font-family:'Oswald',sans-serif;">0</div>
        </div>
      </div>
    </section>

    <!-- 簽到表單 -->
    <section data-aos="fade-up">
      <h2 class="section-title">📝 簽到表單</h2>
      <div class="card p-6">
        <form id="checkinForm" class="space-y-4">
          <!-- 搜尋 -->
          <div>
            <label class="form-label">搜尋姓名或座號</label>
            <input id="searchInput" type="text" placeholder="🔍 輸入關鍵字篩選..."
                   class="form-input">
          </div>
          <!-- 選擇學生 -->
          <div>
            <label class="form-label" for="studentSelect">選擇學生 <span class="text-red-400">*</span></label>
            <select id="studentSelect" required class="form-input">
              <option value="">請選擇學生</option>
            </select>
          </div>
          <!-- 班級座號（唯讀） -->
          <div>
            <label class="form-label">班級座號</label>
            <input type="text" id="studentId" readonly
                   class="form-input opacity-60 cursor-not-allowed"
                   placeholder="選擇學生後自動填入">
          </div>
          <!-- 備註 -->
          <div>
            <label class="form-label" for="note">備註（請假原因等）</label>
            <textarea id="note" rows="2"
                      class="form-input resize-none"
                      placeholder="可填寫請假原因或其他事項"></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-full text-base py-3">
            ✅ 確認簽到
          </button>
        </form>
      </div>
    </section>

    <!-- Toast 通知 -->
    <div id="toast"
         class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-lg text-sm font-semibold shadow-xl transition-all duration-300 opacity-0 pointer-events-none">
    </div>

    <!-- 已簽到名單 -->
    <section data-aos="fade-up">
      <h2 class="section-title">✅ 已簽到名單</h2>
      <div class="card overflow-hidden">
        <div class="overflow-x-auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>姓名</th>
                <th>班級座號</th>
                <th>備註</th>
                <th class="text-center">操作</th>
              </tr>
            </thead>
            <tbody id="signedListBody">
              <tr><td colspan="4" class="text-center text-gray-500 py-6">尚無簽到紀錄</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- 未簽到名單 -->
    <section data-aos="fade-up">
      <h2 class="section-title">❌ 未簽到名單</h2>
      <div class="card overflow-hidden">
        <div class="overflow-x-auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>姓名</th>
                <th>班級座號</th>
              </tr>
            </thead>
            <tbody id="unsignedListBody">
              <tr><td colspan="2" class="text-center text-gray-500 py-6">載入中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- 出缺勤統計 -->
    <section data-aos="fade-up">
      <h2 class="section-title">📊 出缺勤統計</h2>
      <div class="card overflow-hidden">
        <div class="overflow-x-auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>姓名</th>
                <th>座號</th>
                <th>出席</th>
                <th>缺席</th>
                <th>請假</th>
                <th>出席率</th>
              </tr>
            </thead>
            <tbody id="attendanceBody">
              <tr><td colspan="6" class="text-center text-gray-500 py-6">載入中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

  </main>

  <div id="site-footer"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/components.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

  <script>
    renderHeader('社課簽到');
    renderFooter();
    initPageTransition();
    AOS.init({ duration: 600, once: true, offset: 80 });
    window.addEventListener('load', () => document.body.classList.add('loaded'));

    // 今日日期
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('todayDate').textContent = `今日日期：${new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' })}`;

    // Firebase refs
    const signedRef = db.ref(`signedList/${today}`);
    const studentsRef = db.ref('students');

    // DOM 元素
    const form = document.getElementById('checkinForm');
    const searchInput = document.getElementById('searchInput');
    const studentSelect = document.getElementById('studentSelect');
    const studentIdInput = document.getElementById('studentId');
    const totalCountEl = document.getElementById('totalCount');
    const signedCountEl = document.getElementById('signedCount');
    const unsignedCountEl = document.getElementById('unsignedCount');
    const signedBody = document.getElementById('signedListBody');
    const unsignedBody = document.getElementById('unsignedListBody');
    const attendanceBody = document.getElementById('attendanceBody');

    let allStudents = [];

    // Toast 通知
    function showToast(msg, success = true) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-lg text-sm font-semibold shadow-xl transition-all duration-300 ${success ? 'bg-green-600 text-white' : 'bg-red-600 text-white'}`;
      toast.style.opacity = '1';
      toast.style.pointerEvents = 'auto';
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.pointerEvents = 'none';
      }, 3000);
    }

    // 渲染下拉選單
    function renderSelect(students) {
      const keyword = searchInput.value.toLowerCase();
      const filtered = keyword
        ? students.filter(s => s.name.toLowerCase().includes(keyword) || s.id.toLowerCase().includes(keyword))
        : students;
      studentSelect.innerHTML = '<option value="">請選擇學生</option>';
      filtered.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.dataset.name = s.name;
        opt.textContent = `${s.name}（${s.id}）`;
        studentSelect.appendChild(opt);
      });
    }

    // 選擇學生時自動填入座號
    studentSelect.addEventListener('change', () => {
      studentIdInput.value = studentSelect.value;
    });

    // 搜尋篩選
    searchInput.addEventListener('input', () => {
      db.ref('signedList/' + today).once('value').then(snap => {
        const signed = snap.val() || {};
        const signedIds = Object.values(signed).map(s => s.id);
        renderSelect(allStudents.filter(s => !signedIds.includes(s.id)));
      });
    });

    // 出缺勤統計
    async function updateAttendanceTable(students) {
      const allDaysSnap = await db.ref('signedList').once('value');
      const allDaysData = allDaysSnap.val() || {};
      const totalDays = Object.keys(allDaysData).length;
      attendanceBody.innerHTML = '';
      students.forEach(student => {
        let signedCount = 0, leaveCount = 0;
        for (const date in allDaysData) {
          const dayList = Object.values(allDaysData[date]);
          if (dayList.some(s => s.id === student.id)) signedCount++;
          if (dayList.some(s => s.id === student.id && s.note)) leaveCount++;
        }
        const absent = totalDays - signedCount;
        const attendRate = totalDays ? ((signedCount / totalDays) * 100).toFixed(1) + '%' : '—';
        const rateNum = totalDays ? (signedCount / totalDays) * 100 : 0;
        const rateClass = rateNum >= 80 ? 'badge-success' : rateNum >= 60 ? 'badge-warning' : 'badge-danger';
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="font-medium">${student.name}</td>
          <td class="text-gray-400">${student.id}</td>
          <td class="text-green-400">${signedCount}</td>
          <td class="text-red-400">${absent}</td>
          <td class="text-yellow-400">${leaveCount}</td>
          <td><span class="badge ${rateClass}">${attendRate}</span></td>
        `;
        attendanceBody.appendChild(row);
      });
      if (students.length === 0) {
        attendanceBody.innerHTML = '<tr><td colspan="6" class="text-center text-gray-500 py-6">尚無學生資料</td></tr>';
      }
    }

    // 更新名單
    async function updateLists(latestSignedId = null) {
      const signedSnap = await signedRef.get();
      const signedData = signedSnap.val() || {};
      const signedList = Object.entries(signedData).map(([key, v]) => ({ key, ...v }));

      const studentsSnap = await studentsRef.get();
      const studentsData = studentsSnap.val() || {};
      allStudents = Object.entries(studentsData).map(([id, info]) => ({ id, name: info.name }));
      allStudents.sort((a, b) => a.id.localeCompare(b.id));

      renderSelect(allStudents.filter(s => !signedList.some(sig => sig.id === s.id)));

      // 已簽到
      signedBody.innerHTML = '';
      if (signedList.length === 0) {
        signedBody.innerHTML = '<tr><td colspan="4" class="text-center text-gray-500 py-6">尚無簽到紀錄</td></tr>';
      } else {
        signedList.forEach(person => {
          const row = document.createElement('tr');
          row.className = 'animate-row';
          if (latestSignedId && person.id === latestSignedId) row.classList.add('highlight-row');
          const time = new Date(person.timestamp).toLocaleString('zh-TW', {
            month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false
          });
          row.innerHTML = `
            <td class="font-medium">${person.name}</td>
            <td class="text-gray-400">${person.id}</td>
            <td>
              <div>${person.note || '<span class="text-gray-500">—</span>'}</div>
              <div class="text-xs text-gray-500 mt-0.5">🕒 ${time}</div>
            </td>
            <td class="text-center">
              <button class="btn btn-danger text-xs px-3 py-1 deleteBtn" data-key="${person.key}">刪除</button>
            </td>
          `;
          signedBody.appendChild(row);
        });
      }

      // 未簽到
      unsignedBody.innerHTML = '';
      const unsignedStudents = allStudents.filter(s => !signedList.some(sig => sig.id === s.id));
      if (unsignedStudents.length === 0) {
        unsignedBody.innerHTML = '<tr><td colspan="2" class="text-center text-green-400 py-6">🎉 全員已簽到！</td></tr>';
      } else {
        unsignedStudents.forEach(s => {
          const row = document.createElement('tr');
          row.innerHTML = `<td class="font-medium">${s.name}</td><td class="text-gray-400">${s.id}</td>`;
          unsignedBody.appendChild(row);
        });
      }

      // 統計
      totalCountEl.textContent = Object.keys(studentsData).length;
      signedCountEl.textContent = signedList.length;
      unsignedCountEl.textContent = Object.keys(studentsData).length - signedList.length;

      // 刪除按鈕
      document.querySelectorAll('.deleteBtn').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!confirm('確定要刪除此簽到紀錄？')) return;
          db.ref(`signedList/${today}/${btn.dataset.key}`).remove();
          showToast('已刪除簽到紀錄', false);
        });
      });

      updateAttendanceTable(allStudents);
    }

    // 簽到提交
    form.addEventListener('submit', async e => {
      e.preventDefault();
      const selected = studentSelect.selectedOptions[0];
      if (!selected || !selected.value) { showToast('請選擇學生', false); return; }
      const name = selected.dataset.name;
      const id = selected.value;
      const note = document.getElementById('note').value.trim();

      const snapshot = await signedRef.orderByChild('id').equalTo(id).once('value');
      if (snapshot.exists()) { showToast('此學生已簽到', false); return; }

      await signedRef.push({ name, id, note, timestamp: Date.now() });
      form.reset();
      studentIdInput.value = '';
      showToast(`✅ ${name} 簽到成功！`);
      updateLists(id);
    });

    // Firebase 監聽
    signedRef.on('value', () => updateLists());
    studentsRef.on('value', updateLists);
  </script>
</body>
</html>
