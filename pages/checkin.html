<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="內湖高中軍武社 - 社課簽到">
  <title>社課簽到 | 內湖高中軍武社</title>

  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    @keyframes highlight-fade {
      0% {
        background-color: rgba(250, 204, 21, 0.3);
      }

      100% {
        background-color: transparent;
      }
    }

    .highlight-row {
      animation: highlight-fade 2s ease-out forwards;
    }

    .animate-row {
      animation: fadeInUp 0.3s ease-out forwards;
    }

    /* -------------------------------------
       滑動簽到樣式 (Swipe to Check-in)
    ---------------------------------------- */
    .swipe-container {
      position: relative;
      width: 100%;
      height: 56px;
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1.5rem;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
      user-select: none;
    }

    .swipe-text {
      position: absolute;
      color: #94a3b8;
      font-weight: 600;
      letter-spacing: 0.1em;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 0;
      font-size: 0.875rem;
    }

    .swipe-slider {
      position: absolute;
      left: 4px;
      height: 48px;
      width: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #facc15 0%, #eab308 100%);
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(250, 204, 21, 0.3);
      z-index: 10;
      touch-action: none;
    }

    .swipe-slider.resetting {
      transition: left 0.4s ease;
    }

    .swipe-slider::after {
      content: '»';
      color: #111827;
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 2px;
    }
  </style>
</head>

<body>
  <!-- 液態流動背景 -->
  <div class="liquid-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div id="site-header"></div>

  <!-- ========== 頁面標題區 ========== -->
  <section class="hero-section py-16 px-4 text-center" data-aos="fade-up">
    <div class="hero-bg" style="background-image: url('../assets/images/IMG_1645.jpg');"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-background/40 via-background/60 to-background z-10"></div>
    <div class="relative z-20">
      <h1 class="hero-title text-4xl md:text-5xl font-bold text-yellow-300 mb-2" style="font-family:'Oswald',sans-serif;">社課簽到</h1>
      <p class="text-gray-400 text-sm uppercase tracking-widest" id="todayDate">今日日期載入中...</p>
    </div>
  </section>

  <main class="max-w-5xl mx-auto px-4 py-20 space-y-24">

    <!-- 統計卡片 -->
    <section data-aos="fade-up">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="card p-5 text-center">
          <div class="text-primary text-xs font-semibold uppercase tracking-wider mb-1">總人數</div>
          <div id="totalCount"
            class="text-4xl md:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-br from-yellow-300 to-yellow-600"
            style="font-family:var(--font-heading);">0</div>
        </div>
        <div class="card p-5 text-center">
          <div class="text-primary text-xs font-semibold uppercase tracking-wider mb-1">已簽到</div>
          <div id="signedCount"
            class="text-4xl md:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-br from-yellow-300 to-yellow-600"
            style="font-family:var(--font-heading);">0</div>
        </div>
        <div class="card p-5 text-center">
          <div class="text-primary text-xs font-semibold uppercase tracking-wider mb-1">未簽到</div>
          <div id="unsignedCount"
            class="text-4xl md:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-br from-yellow-300 to-yellow-600"
            style="font-family:var(--font-heading);">0</div>
        </div>
      </div>
    </section>

    <!-- 簽到表單 -->
    <section data-aos="fade-up">
      <h2 class="section-title"><span class="w-1.5 h-8 bg-primary block rounded-full"></span>簽到表單 <span
          class="text-sm text-gray-500 font-normal ml-2 tracking-widest uppercase">Check-in Form</span></h2>
      <div class="card p-6">
        <form id="checkinForm" class="space-y-4">
          <!-- 搜尋 -->
          <div>
            <label class="form-label">搜尋姓名或座號</label>
            <input id="searchInput" type="text" placeholder="🔍 輸入關鍵字篩選..." class="form-input">
          </div>
          <!-- 選擇學生 -->
          <div>
            <label class="form-label" for="studentSelect">選擇學生 <span class="text-red-400">*</span></label>
            <select id="studentSelect" required class="form-input">
              <option value="">請選擇學生</option>
            </select>
          </div>
          <!-- 班級座號（唯讀） -->
          <div>
            <label class="form-label">班級座號</label>
            <input type="text" id="studentId" readonly class="form-input opacity-60 cursor-not-allowed"
              placeholder="選擇學生後自動填入">
          </div>
          <!-- 備註 -->
          <div>
            <label class="form-label" for="note">備註（請假原因等）</label>
            <textarea id="note" rows="2" class="form-input resize-none" placeholder="可填寫請假原因或其他事項"></textarea>
          </div>
          <div id="swipeContainer" class="swipe-container">
            <div id="swipeText" class="swipe-text">向右滑動確認簽到</div>
            <div id="swipeSlider" class="swipe-slider"></div>
          </div>
        </form>
      </div>
    </section>

    <!-- 未簽到名單（僅幹部可見） -->
    <div id="unsignedSection" class="hidden">
      <h2 class="section-title"><span class="w-1.5 h-8 bg-primary block rounded-full"></span>未簽到名單 <span class="text-sm text-gray-500 font-normal ml-2 tracking-widest uppercase">Unsigned List</span></h2>
      <div class="card overflow-hidden">
        <div class="overflow-x-auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>姓名</th>
                <th>班級座號</th>
              </tr>
            </thead>
            <tbody id="unsignedListBody">
              <tr>
                <td colspan="2" class="text-center text-gray-500 py-6">載入中...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 未登入時的名單遮罩 -->
    <div id="unsignedLocked" class="card p-8 text-center space-y-3">
      <div class="text-4xl">🔒</div>
      <p class="text-gray-400 text-sm">未簽到名單僅供幹部查看</p>
      <a href="../login.html" class="inline-block px-5 py-2 rounded-full bg-yellow-400 text-black text-sm font-semibold hover:bg-yellow-300 transition">幹部登入</a>
    </div>
  </main>

  <div id="site-footer"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/components.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

  <script>
    renderHeader('社課簽到');
    renderFooter();
    window.addEventListener('load', () => {
      document.body.classList.add('loaded');
      AOS.init({ duration: 400, once: true, offset: 50 });
    });

    // 今日日期
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('todayDate').textContent = `今日日期：${new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' })}`;

    // Firebase refs
    const signedRef = db.ref(`signedList/${today}`);
    const studentsRef = db.ref('students');

    // DOM 元素
    const form = document.getElementById('checkinForm');
    const searchInput = document.getElementById('searchInput');
    const studentSelect = document.getElementById('studentSelect');
    const studentIdInput = document.getElementById('studentId');
    const totalCountEl = document.getElementById('totalCount');
    const signedCountEl = document.getElementById('signedCount');
    const unsignedCountEl = document.getElementById('unsignedCount');
    const unsignedBody = document.getElementById('unsignedListBody');

    let allStudents = [];

    // 渲染下拉選單
    function renderSelect(students) {
      const keyword = searchInput.value.toLowerCase();
      const filtered = keyword
        ? students.filter(s => s.name.toLowerCase().includes(keyword) || s.id.toLowerCase().includes(keyword))
        : students;
      studentSelect.innerHTML = '<option value="" class="bg-[#09090b] text-gray-200">請選擇學生</option>';
      filtered.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.dataset.name = s.name;
        opt.textContent = `${s.name}（${s.id}）`;
        opt.className = 'bg-[#09090b] text-gray-200';
        studentSelect.appendChild(opt);
      });
    }

    // 選擇學生時自動填入座號
    studentSelect.addEventListener('change', () => {
      studentIdInput.value = studentSelect.value;
    });

    // 搜尋篩選
    searchInput.addEventListener('input', () => {
      db.ref('signedList/' + today).once('value').then(snap => {
        const signed = snap.val() || {};
        const signedIds = Object.values(signed).map(s => s.id);
        renderSelect(allStudents.filter(s => !signedIds.includes(s.id)));
      });
    });

    // 更新名單
    async function updateLists(latestSignedId = null) {
      const signedSnap = await signedRef.get();
      const signedData = signedSnap.val() || {};
      const signedList = Object.entries(signedData).map(([key, v]) => ({ key, ...v }));

      const studentsSnap = await studentsRef.get();
      const studentsData = studentsSnap.val() || {};
      allStudents = Object.entries(studentsData).map(([id, info]) => ({ id, name: info.name }));
      allStudents.sort((a, b) => a.id.localeCompare(b.id));

      const signedIds = signedList.map(s => s.id);
      const unsignedList = allStudents.filter(s => !signedIds.includes(s.id));

      // 更新統計數字
      totalCountEl.textContent = allStudents.length;
      signedCountEl.textContent = signedList.length;
      unsignedCountEl.textContent = unsignedList.length;

      // 更新下拉選單
      renderSelect(unsignedList);

      // 更新未簽到名單表格
      unsignedBody.innerHTML = '';
      if (unsignedList.length > 0) {
        unsignedList.forEach(s => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td class="font-medium">${s.name}</td>
            <td class="text-gray-400">${s.id}</td>
          `;
          unsignedBody.appendChild(row);
        });
      } else {
        unsignedBody.innerHTML = '<tr><td colspan="2" class="text-center text-gray-500 py-6">全員到齊！</td></tr>';
      }
    }

    // 執行簽到邏輯
    function performCheckin() {
      const studentId = studentSelect.value;
      const selectedOption = studentSelect.options[studentSelect.selectedIndex];
      const studentName = selectedOption ? selectedOption.dataset.name : '';
      const note = document.getElementById('note').value;

      if (!studentId) {
        window.showToast('請選擇學生', false);
        resetSlider();
        return;
      }

      signedRef.push({ id: studentId, name: studentName, note: note, timestamp: Date.now() })
        .then(() => {
          window.showToast('簽到成功！', true);
          form.reset();
          studentIdInput.value = '';
          updateLists(studentId);
          resetSlider();
        })
        .catch(err => {
          window.showToast('簽到失敗：' + err.message, false);
          resetSlider();
        });
    }

    // 保留 Enter 鍵送出的相容性
    form.addEventListener('submit', e => {
      e.preventDefault();
      performCheckin();
    });

    // 取消簽到
    window.cancelCheckin = (key) => {
      if (confirm('確定要取消此筆簽到嗎？')) {
        signedRef.child(key).remove()
          .then(() => {
            window.showToast('取消簽到成功！', true);
            updateLists();
          })
          .catch(err => window.showToast('取消簽到失敗：' + err.message, false));
      }
    }

    // =============================================
    // 滑動簽到 UI 互動邏輯
    // =============================================
    const swipeContainer = document.getElementById('swipeContainer');
    const swipeSlider = document.getElementById('swipeSlider');
    const swipeText = document.getElementById('swipeText');

    let isDragging = false;
    let startX = 0;
    let maxLeft = 0;

    function initSwipe() {
      maxLeft = swipeContainer.offsetWidth - swipeSlider.offsetWidth - 8; // 兩側各留 4px
    }
    window.addEventListener('resize', initSwipe);

    function startDrag(e) {
      isDragging = true;
      swipeSlider.classList.remove('resetting');
      startX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
      initSwipe(); // 確保重新計算最大寬度
    }

    function doDrag(e) {
      if (!isDragging) return;
      let x = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
      let diff = x - startX;
      let newLeft = 4 + diff;

      if (newLeft < 4) newLeft = 4;
      if (newLeft > maxLeft + 4) newLeft = maxLeft + 4;

      swipeSlider.style.left = newLeft + 'px';
      swipeText.style.opacity = 1 - (newLeft / (maxLeft + 4));
    }

    function endDrag(e) {
      if (!isDragging) return;
      isDragging = false;

      let currentPos = parseInt(swipeSlider.style.left || 4);
      if (currentPos >= maxLeft) {
        performCheckin(); // 滑到最右邊觸發簽到
      } else {
        resetSlider(); // 未達終點自動彈回
      }
    }

    function resetSlider() {
      swipeSlider.classList.add('resetting');
      swipeSlider.style.left = '4px';
      swipeText.style.opacity = 1;
    }

    // 綁定滑鼠與觸控事件
    swipeSlider.addEventListener('mousedown', startDrag);
    document.addEventListener('mousemove', doDrag);
    document.addEventListener('mouseup', endDrag);

    swipeSlider.addEventListener('touchstart', startDrag, { passive: true });
    document.addEventListener('touchmove', doDrag, { passive: true });
    document.addEventListener('touchend', endDrag);

    // 身份驗證：未登入只隱藏名單，表單仍可使用
    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('unsignedSection').classList.remove('hidden');
        document.getElementById('unsignedLocked').classList.add('hidden');
      } else {
        document.getElementById('unsignedSection').classList.add('hidden');
        document.getElementById('unsignedLocked').classList.remove('hidden');
      }
    });

    // 初始化
    updateLists();

  </script>
</body>
</html>
