<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="內湖高中軍武社 - 活動排程">
  <title>活動排程 | 內湖高中軍武社</title>

  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <!-- FullCalendar CSS -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/main.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    /* FullCalendar 深色主題覆寫 */
    .fc {
      --fc-border-color: #374151;
      --fc-button-bg-color: var(--color-secondary);
      --fc-button-border-color: var(--color-secondary);
      --fc-button-hover-bg-color: #334155;
      --fc-button-hover-border-color: #334155;
      --fc-button-active-bg-color: #1e293b;
      --fc-today-bg-color: rgba(250, 204, 21, 0.1);
      --fc-page-bg-color: var(--color-card-bg);
      --fc-neutral-bg-color: var(--color-background);
      color: var(--color-text-light);
      font-family: var(--font-body);
      font-size: 0.875rem;
    }
    .fc .fc-toolbar-title { font-family: var(--font-heading); font-size: 1.25rem; color: var(--color-primary); }
    .fc .fc-col-header-cell { background-color: var(--color-background); }
    .fc .fc-col-header-cell-cushion { color: var(--color-text-muted); font-weight: 600; }
    .fc .fc-daygrid-day-number { color: var(--color-text-light); }
    .fc .fc-daygrid-day.fc-day-today .fc-daygrid-day-number { color: var(--color-primary); font-weight: 700; }
    .fc .fc-event { border-radius: 4px; font-size: 0.75rem; }
    .fc .fc-button { font-family: var(--font-heading); letter-spacing: 0.025em; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <!-- ========== 頁面標題區 ========== -->
  <section class="hero-section py-16 px-4 text-center" data-aos="fade-up">
    <div class="hero-bg" style="background-image: url(\'../assets/images/IMG_1645.jpg\');"></div>
    <div class="relative z-10">
      <h1 class="text-4xl md:text-5xl font-bold text-yellow-300 mb-2" style="font-family:\'Oswald\',sans-serif;">活動排程</h1>
      <p class="text-gray-400 text-sm uppercase tracking-widest">NHMC Schedule</p>
    </div>
  </section>

  <!-- ========== 主內容 ========== -->
  <main class="max-w-5xl mx-auto px-4 py-12 space-y-12">

    <section data-aos="fade-up">
      <h2 class="section-title">📅 社團活動日曆</h2>
      <div class="card p-4 md:p-6">
        <div id="calendar"></div>
      </div>
    </section>

  </main>

  <div id="site-footer"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/components.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <!-- FullCalendar JS -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/locales/zh-tw.global.min.js"></script>

  <script>
    renderHeader("活動排程");
    renderFooter();
    initPageTransition();
    AOS.init({ duration: 600, once: true, offset: 80 });
    window.addEventListener("load", () => document.body.classList.add("loaded"));

    document.addEventListener("DOMContentLoaded", function() {
      const calendarEl = document.getElementById("calendar");
      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: "dayGridMonth",
        locale: "zh-tw",
        headerToolbar: {
          left: "prev,next today",
          center: "title",
          right: "dayGridMonth,timeGridWeek,timeGridDay"
        },
        buttonText: {
          today: "今天",
          month: "月",
          week: "週",
          day: "日"
        },
        events: [], // 將從 Firebase 載入事件
        eventClick: function(info) {
          // 點擊事件時的處理
          window.showToast("活動: " + info.event.title + "\n時間: " + info.event.start.toLocaleString(), true);
        },
        eventDidMount: function(info) {
          // 自定義事件渲染，例如添加 Tailwind CSS 類別
          info.el.classList.add("rounded-md", "px-2", "py-1", "text-xs", "font-medium", "shadow-sm");
          if (info.event.extendedProps.type === "社課") {
            info.el.classList.add("bg-yellow-600", "text-white");
          } else if (info.event.extendedProps.type === "活動") {
            info.el.classList.add("bg-blue-600", "text-white");
          } else {
            info.el.classList.add("bg-gray-600", "text-white");
          }
        }
      });

      // 從 Firebase 載入活動
      const eventsRef = db.ref("events");
      eventsRef.on("value", snapshot => {
        const firebaseEvents = snapshot.val();
        const calendarEvents = [];
        for (let id in firebaseEvents) {
          const event = firebaseEvents[id];
          calendarEvents.push({
            id: id,
            title: event.title,
            start: event.start,
            end: event.end || event.start, // 如果沒有結束時間，則結束時間等於開始時間
            extendedProps: {
              type: event.type || "活動"
            }
          });
        }
        calendar.removeAllEvents();
        calendar.addEventSource(calendarEvents);
      });

      calendar.render();

      // 處理從首頁公告點擊過來的事件
      const urlParams = new URLSearchParams(window.location.search);
      const eventId = urlParams.get("eventId");
      if (eventId) {
        db.ref(`announcements/${eventId}`).once("value", snapshot => {
          const announcement = snapshot.val();
          if (announcement && announcement.linkedEventId) {
            const linkedEventId = announcement.linkedEventId;
            db.ref(`events/${linkedEventId}`).once("value", eventSnapshot => {
              const event = eventSnapshot.val();
              if (event) {
                // 導航到事件日期並顯示事件詳情
                calendar.gotoDate(event.start);
                window.showToast("相關活動: " + event.title + "\n時間: " + new Date(event.start).toLocaleString(), true);
              }
            });
          }
        });
      }
    });
  </script>
</body>
</html>
