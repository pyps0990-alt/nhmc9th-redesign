<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="內湖高中軍武社 - 財務紀錄">
  <title>財務紀錄 | 內湖高中軍武社</title>

  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>

<body>
  <!-- 液態流動背景 -->
  <div class="liquid-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div id="site-header"></div>

  <!-- 頁面標題 -->
  <section class="hero-section py-16 px-4 text-center" data-aos="fade-up">
    <div class="hero-bg" style="background-image: url('../assets/images/IMG_1645.jpg');"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-background/40 via-background/60 to-background z-10"></div>
    <div class="relative z-20">
      <h1 class="hero-title text-4xl md:text-5xl font-bold text-yellow-300 mb-2" style="font-family:'Oswald',sans-serif;">財務紀錄</h1>
      <p class="text-gray-400 text-sm uppercase tracking-widest">Finance Records</p>
    </div>
  </section>

  <main class="max-w-5xl mx-auto px-4 py-20 space-y-24">

    <!-- 餘額總覽 -->
    <section data-aos="fade-up">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
        <div class="card p-6 text-center">
          <div class="text-primary text-xs font-semibold uppercase tracking-wider mb-2">總收入</div>
          <div id="totalIncome" class="text-3xl font-bold text-white" style="font-family:'Oswald',sans-serif;">NT$ 0
          </div>
        </div>
        <div class="card p-6 text-center">
          <div class="text-primary text-xs font-semibold uppercase tracking-wider mb-2">總支出</div>
          <div id="totalExpense" class="text-3xl font-bold text-white" style="font-family:'Oswald',sans-serif;">NT$ 0
          </div>
        </div>
        <div class="card p-6 text-center" id="balanceCard">
          <div class="text-primary text-xs font-semibold uppercase tracking-wider mb-2">結餘</div>
          <div id="balanceAmount" class="text-3xl font-bold text-white" style="font-family:'Oswald',sans-serif;">NT$ 0
          </div>
        </div>
      </div>
    </section>

    <!-- 收支明細 -->
    <section data-aos="fade-up">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- 收入表 -->
        <div>
          <h2 class="section-title">
            <span class="w-1.5 h-8 bg-primary block rounded-full"></span>收入明細 <span class="text-sm text-gray-400 font-normal ml-2 tracking-widest uppercase">Income</span>
            <span class="text-xs font-normal text-gray-500 ml-auto hidden md:inline-block" style="font-family:inherit;">（單位：新台幣）</span>
          </h2>
          <div class="card overflow-hidden">
            <table class="data-table">
              <thead>
                <tr>
                  <th>項目</th>
                  <th class="text-right">金額</th>
                </tr>
              </thead>
              <tbody id="incomeTable">
                <tr>
                  <td colspan="2" class="text-center text-gray-500 py-6">載入中...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- 支出表 -->
        <div>
          <h2 class="section-title">
            <span class="w-1.5 h-8 bg-primary block rounded-full"></span>支出明細 <span class="text-sm text-gray-400 font-normal ml-2 tracking-widest uppercase">Expense</span>
            <span class="text-xs font-normal text-gray-500 ml-auto hidden md:inline-block" style="font-family:inherit;">（單位：新台幣）</span>
          </h2>
          <div class="card overflow-hidden">
            <table class="data-table">
              <thead>
                <tr>
                  <th>項目</th>
                  <th class="text-right">金額</th>
                </tr>
              </thead>
              <tbody id="expenseTable">
                <tr>
                  <td colspan="2" class="text-center text-gray-500 py-6">載入中...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </section>

    <!-- 說明 -->
    <section data-aos="fade-up">
      <div class="card p-5">
        <p class="text-gray-300 text-sm flex items-start gap-2">
          <span class="shrink-0">ℹ️</span>
          <span>財務紀錄由社團幹部負責維護，如有疑問請聯絡社長或財務幹部。所有收支皆以實際發生為準。</span>
        </p>
      </div>
    </section>

  </main>

  <div id="site-footer"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/components.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

  <script>
    renderHeader('財務紀錄');
    renderFooter();
    window.addEventListener('load', () => {
      document.body.classList.add('loaded');
      AOS.init({ duration: 400, once: true, offset: 50 });
    });

    function formatCurrency(num) {
      return 'NT$ ' + Number(num).toLocaleString('zh-TW', { style: 'decimal' });
    }

    const incomeTable = document.getElementById('incomeTable');
    const expenseTable = document.getElementById('expenseTable');
    const totalIncomeEl = document.getElementById('totalIncome');
    const totalExpenseEl = document.getElementById('totalExpense');
    const balanceAmountEl = document.getElementById('balanceAmount');
    const balanceCard = document.getElementById('balanceCard');

    // 讀取 finance/record（AppScript 寫入格式：{income:[{item,amount}], expense:[...]}）
    db.ref('finance/record').on('value', snapshot => {
      const data = snapshot.val() || {};
      incomeTable.innerHTML = '';
      expenseTable.innerHTML = '';
      let totalIncome = 0;
      let totalExpense = 0;

      const incomes  = Array.isArray(data.income)  ? data.income  : Object.values(data.income  || {});
      const expenses = Array.isArray(data.expense) ? data.expense : Object.values(data.expense || {});

      if (incomes.length > 0) {
        incomes.forEach(item => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="font-medium">${item.item}</td>
            <td class="text-right font-mono text-primary">${formatCurrency(item.amount)}</td>
          `;
          incomeTable.appendChild(tr);
          totalIncome += Number(item.amount);
        });
      } else {
        incomeTable.innerHTML = '<tr><td colspan="2" class="text-center text-gray-500 py-4">尚無收入紀錄</td></tr>';
      }

      if (expenses.length > 0) {
        expenses.forEach(item => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="font-medium">${item.item}</td>
            <td class="text-right font-mono text-primary">${formatCurrency(item.amount)}</td>
          `;
          expenseTable.appendChild(tr);
          totalExpense += Number(item.amount);
        });
      } else {
        expenseTable.innerHTML = '<tr><td colspan="2" class="text-center text-gray-500 py-4">尚無支出紀錄</td></tr>';
      }

      const balance = totalIncome - totalExpense;
      totalIncomeEl.textContent = formatCurrency(totalIncome);
      totalExpenseEl.textContent = formatCurrency(totalExpense);
      balanceAmountEl.textContent = formatCurrency(balance);

      // 餘額顏色
      if (balance > 0) {
        balanceCard.classList.add('bg-green-700');
        balanceCard.classList.remove('bg-red-700', 'bg-gray-700');
        balanceAmountEl.classList.add('text-white');
      } else if (balance < 0) {
        balanceCard.classList.add('bg-red-700');
        balanceCard.classList.remove('bg-green-700', 'bg-gray-700');
        balanceAmountEl.classList.add('text-white');
      } else {
        balanceCard.classList.add('bg-gray-700');
        balanceCard.classList.remove('bg-green-700', 'bg-red-700');
      }
    });
  </script>
</body>

</html>
